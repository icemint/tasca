# The egress allowlist proxy for the agent-runner. The runner sits on internal-only
# networks (no default route to the internet); its ONLY path out is this proxy. So even
# a prompt-injected agent that unsets HTTPS_PROXY cannot reach the internet directly —
# and what DOES go through here is constrained to the allowlist below. This is the
# control that stops the agent exfiltrating its scoped GitHub token to a third party.
#
# Hardening notes:
#   - FilterDefaultDeny Yes  → deny everything not explicitly allowed (allowlist, not denylist).
#   - Filter applies to CONNECT (HTTPS) destinations too, matched against /etc/tinyproxy/allowlist.
#   - ConnectPort restricts CONNECT tunnels to 443 (no tunneling to arbitrary TCP ports,
#     e.g. an exfil listener on :4444 or SMTP on :25).
#   - Listen on all interfaces INSIDE the internal network only; the proxy is never
#     published to the host. Allow only the private ranges the runner network uses.

User tinyproxy
Group tinyproxy

Port 8888
# Bind inside the container; reachable only over the internal docker networks.
Listen 0.0.0.0
Timeout 600

# Allowlist enforcement.
FilterDefaultDeny Yes
Filter "/etc/tinyproxy/allowlist"
# Match the filter against the full host, case-insensitively, as a URL/host filter.
FilterExtended On
FilterCaseSensitive Off
FilterURLs Off

# CONNECT (HTTPS) is allowed only to 443 — no arbitrary-port tunnels out.
ConnectPort 443

# Who may USE the proxy: only the private docker network ranges. Not the public internet.
Allow 10.0.0.0/8
Allow 172.16.0.0/12
Allow 192.168.0.0/16

# Don't leak the proxy's presence / client IPs downstream.
DisableViaHeader Yes
XTinyproxy Off

LogLevel Notice
