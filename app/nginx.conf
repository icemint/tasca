# Static serving for the Tasca app shell (app.tasca.dev). Single-page sign-in
# surface today; SPA-style fallback so client routes resolve to the app shell.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable — cache hard.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API reverse-proxy: the browser reaches the worker same-origin at
    # app.tasca.dev/api/* (so auth needs no CORS and the session cookie is
    # host-only). `tasca-worker` is the worker's service DNS name — the app's
    # Coolify resource must join the worker's network for this name to resolve;
    # the worker listens on :8080.
    location /api/ {
        proxy_pass http://tasca-worker:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;
}
