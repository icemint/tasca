# Static serving for the Tasca app shell (app.tasca.dev). Single-page sign-in
# surface today; SPA-style fallback so client routes resolve to the app shell.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable — cache hard.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Docker/Coolify embedded DNS. Needed so the /api/ upstream below is resolved
    # at REQUEST time (via the variable form) instead of at startup — otherwise
    # nginx refuses to boot ("host not found in upstream") whenever tasca-worker
    # isn't yet resolvable, crash-looping the app before it's joined to the network.
    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;

    # API reverse-proxy: the browser reaches the worker same-origin at
    # app.tasca.dev/api/* — so both auth and the read API need NO CORS, and the
    # session cookie is host-only and rides along automatically. The app's Coolify
    # resource must join the worker's network for `tasca-worker` to resolve; until
    # then nginx still starts (serving the static UI) and /api/* returns 502.
    location /api/ {
        set $tasca_upstream tasca-worker:8080;   # variable → deferred DNS resolution
        proxy_pass http://$tasca_upstream;        # no URI part → full /api/* path forwarded
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # The deploy SHA stamp (built into dist/version.txt; the CD verify gate polls it). no-store so a
    # cache/CDN can't serve a STALE sha and false-fail the gate; =404 (not the SPA shell) on an old
    # image that predates the file, so the poll keeps waiting for the new image instead of matching HTML.
    location = /version.txt {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;
}
