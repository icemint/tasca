# Static serving for the Tasca marketing site (Astro static output).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable — cache hard.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pretty routes: /docs -> /docs/index.html; fall through to the 404 page.
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    error_page 404 /404.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;
}
