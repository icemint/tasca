<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasca — Legal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tasca.css">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="marketing/marketing.css">
<link rel="stylesheet" href="marketing/pages.css">
<link rel="stylesheet" href="assets/a11y.css">
</head>
<body>
<div id="nav"></div>

<main>
  <section class="phero"><div class="wrap-narrow">
    <span class="kicker">Legal</span>
    <h1 id="legalTitle">Terms of Service</h1>
    <p id="legalIntro">The agreement between you and Tasca for use of the platform.</p>
  </div></section>

  <section class="sec-sm"><div class="wrap-narrow">
    <div class="legal-tabs">
      <button class="legal-tab on" data-k="terms">Terms</button>
      <button class="legal-tab" data-k="privacy">Privacy</button>
      <button class="legal-tab" data-k="cookies">Cookies</button>
    </div>
    <div class="prose" id="prose"></div>
  </div></section>
</main>

<div id="foot"></div>

<script src="marketing/site.js"></script>
<script>
(function(){
  const S=window.SITE, I=S.I; S.mount();
  const note = `<div class="tmpl-note"><span class="ic">${I.info}</span><span><b>Template — counsel to complete.</b> This page is a structured placeholder with the standard sections for review. Substantive legal language must be supplied by Tasca’s legal counsel before launch. Headings reflect intended scope, not final terms.</span></div>`;
  const ph = t => `<p class="placeholder">${t}</p>`;
  const sec = (h, body) => `<h2>${h}</h2>${body}`;

  const DOCS = {
    terms: {
      title:'Terms of Service', intro:'The agreement between you and Tasca for use of the platform.',
      body: note + `<div class="meta">Last updated: [DATE] · Effective: [DATE]</div>` +
        sec('1. Agreement to terms', ph('[Binding-agreement language, acceptance on account creation, capacity to contract.]')) +
        sec('2. The service', ph('[Description of Tasca: agentic delivery platform, self-hosted and managed offerings, what is and isn’t included.]')) +
        sec('3. Accounts & organizations', ph('[Account creation via OAuth/email, org ownership, roles (owner/admin/member/guest), responsibility for credentials.]')) +
        sec('4. Acceptable use', ph('[Prohibited uses, no unlawful/infringing activity, agent-execution boundaries, rate limits, anti-abuse.]')) +
        sec('5. Third-party platforms & models', ph('[Shortcut/GitHub/Linear connections, customer-supplied model vendor keys, Anthropic Console-key compliance, no liability for third-party outages.]')) +
        sec('6. Customer content & IP', ph('[Customer retains rights to code/data; license granted to operate the service; agent-generated output ownership.]')) +
        sec('7. Fees & billing', ph('[Per-seat fees, model spend billed to customer keys, taxes, renewal, non-payment. See Pricing.]')) +
        sec('8. Warranties & disclaimers', ph('[“As-is”, no warranty that agents produce correct code, human review required.]')) +
        sec('9. Limitation of liability', ph('[Liability cap, exclusion of indirect damages — to be set by counsel.]')) +
        sec('10. Termination', ph('[Termination for cause/convenience, data export window, effect of termination.]')) +
        sec('11. Changes & governing law', ph('[Amendment process, notice, governing jurisdiction, dispute resolution.]')) +
        sec('12. Contact', ph('[legal@tasca.example — registered entity & address.]')),
    },
    privacy: {
      title:'Privacy Policy', intro:'How Tasca collects, uses, and protects your data.',
      body: note + `<div class="meta">Last updated: [DATE]</div>` +
        sec('1. Who we are', ph('[Data controller identity, registered address, DPO/privacy contact.]')) +
        sec('2. Data we collect', `<p>${'We collect the minimum needed to operate the platform. Categories include:'}</p><ul>
          <li>Account data — name, email, OAuth identifiers</li>
          <li>Organization & membership data — roles, team structure</li>
          <li>Operational data — agents, tickets, routing decisions, audit events</li>
          <li>Credentials — provider tokens & vendor keys, <b>encrypted at rest</b></li></ul>` + ph('[Confirm exhaustive categories with counsel; add analytics/telemetry posture — note Tasca ships telemetry-free.]')) +
        sec('3. How we use it', ph('[Service operation, routing, billing, support, security. No sale of personal data.]')) +
        sec('4. Legal bases', ph('[GDPR Art.6 bases — contract, legitimate interest, consent — per processing purpose.]')) +
        sec('5. Sharing & sub-processors', ph('[Hosting, model vendors (customer-keyed), payment processor; sub-processor list & DPA.]')) +
        sec('6. Data retention', ph('[Retention periods per data category; deletion on account closure; audit-log immutability caveat.]')) +
        sec('7. Security', `<p>${'Provider tokens and vendor keys are stored as AES-256-GCM ciphertext under a dedicated server key. Credentials are never displayed in full after entry.'}</p>` + ph('[Add breach-notification commitment, encryption-in-transit, access controls per counsel.]')) +
        sec('8. Your rights', ph('[Access, rectification, erasure, portability, objection; how to exercise; supervisory-authority complaint.]')) +
        sec('9. International transfers', ph('[Transfer mechanism — SCCs/adequacy — and data-residency options for self-hosting.]')) +
        sec('10. Contact', ph('[privacy@tasca.example]')),
    },
    cookies: {
      title:'Cookie Policy', intro:'How Tasca uses cookies and similar technologies.',
      body: note + `<div class="meta">Last updated: [DATE]</div>` +
        sec('1. What we use', `<p>${'Tasca uses a minimal set of cookies. We do not use advertising or cross-site tracking cookies, and the platform ships telemetry-free.'}</p>`) +
        sec('2. Categories', `<ul>
          <li><b>Strictly necessary</b> — session & authentication (JWT/refresh), CSRF protection. Always on.</li>
          <li><b>Preferences</b> — theme (dark/light) and UI settings, stored locally.</li>
          <li><b>Analytics</b> — [none by default; if added, list provider & purpose].</li></ul>` + ph('[Counsel to confirm final cookie inventory and durations.]')) +
        sec('3. Managing cookies', ph('[Browser controls, consent mechanism where required, effect of disabling necessary cookies.]')) +
        sec('4. Changes & contact', ph('[Update process; privacy@tasca.example.]')),
    },
  };

  function render(k){
    const d = DOCS[k];
    document.getElementById('legalTitle').textContent = d.title;
    document.getElementById('legalIntro').textContent = d.intro;
    document.getElementById('prose').innerHTML = d.body;
    document.querySelectorAll('.legal-tab').forEach(b=>b.classList.toggle('on', b.dataset.k===k));
    if (history.replaceState) history.replaceState(null,'','#'+k);
  }
  document.querySelectorAll('.legal-tab').forEach(b=>b.addEventListener('click',()=>render(b.dataset.k)));
  const hash=(location.hash||'#terms').slice(1);
  render(DOCS[hash]?hash:'terms');
})();
</script>
</body>
</html>
