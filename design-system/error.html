<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Tasca</title>
<meta name="description" content="The page you're looking for doesn't exist.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tasca.css">
<style>
.err-stage { min-height: 100vh; display: flex; flex-direction: column; position: relative; overflow: hidden; }
.err-stage::before { content: ""; position: absolute; top: -180px; left: 50%; transform: translateX(-50%);
  width: 760px; height: 560px; pointer-events: none;
  background: radial-gradient(closest-side, var(--signal-glow), transparent 70%); }
.err-top { position: relative; }
.err-body { flex: 1; display: grid; place-items: center; padding: 40px 24px 80px; position: relative; }
.err-inner { text-align: center; max-width: 560px; }
.err-code { font-family: var(--f-mono); font-size: clamp(96px, 18vw, 184px); font-weight: 600;
  line-height: 0.9; letter-spacing: -0.04em; color: var(--fg);
  display: inline-flex; align-items: center; gap: 8px; }
.err-code .z { color: var(--signal); }
.err-eyebrow { justify-content: center; }
.err-inner h1 { font-size: clamp(28px, 4vw, 40px); letter-spacing: -0.025em; margin-top: 26px; }
.err-inner .lead { margin-top: 16px; max-width: 440px; margin-left: auto; margin-right: auto; }
.err-route { margin-top: 26px; display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--f-mono); font-size: 12.5px; color: var(--fg-3);
  border: 1px solid var(--line); background: var(--surface); border-radius: var(--r-md); padding: 9px 14px; }
.err-route .k { color: var(--fg-4); }
.err-route .v { color: var(--red); }
.err-cta { margin-top: 34px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
</style>
<link rel="stylesheet" href="assets/tokens.css">
</head>
<body>
<div class="err-stage">
  <header class="header err-top">
    <div class="container nav">
      <div class="nav-left">
        <a class="brand" href="index.html" aria-label="Tasca home">
          <svg class="brand-mark" viewBox="0 0 26 26" fill="none" aria-hidden="true">
            <rect x="0.6" y="0.6" width="24.8" height="24.8" rx="7" fill="#0F1622" stroke="rgba(255,255,255,0.14)"/>
            <rect x="5" y="6" width="3.6" height="14" rx="1.4" fill="#5C6779"/>
            <rect x="11.2" y="6" width="3.6" height="10.5" rx="1.4" fill="#4D9CF6"/>
            <rect x="17.4" y="6" width="3.6" height="7" rx="1.4" fill="#FFC53D"/>
          </svg>
          <span class="brand-word"><span class="a">Tas</span><span class="b">ca</span></span>
        </a>
      </div>
      <div class="nav-right">
        <a class="nav-ghost hide-sm" href="docs.html">Docs</a>
        <a class="btn btn-primary btn-sm" href="index.html">Back home</a>
      </div>
    </div>
  </header>

  <main class="err-body">
    <div class="err-inner">
      <span class="eyebrow err-eyebrow">Error · 404</span>
      <div class="err-code">4<span class="z">0</span>4</div>
      <h1>This ticket doesn't exist.</h1>
      <p class="lead">The page you're looking for was moved, merged, or never made it onto the board. No agent could pick it up.</p>
      <div class="err-route"><span class="k">route</span> → <span class="v">no_such_page</span></div>
      <div class="err-cta">
        <a class="btn btn-primary btn-lg" href="index.html">Back to home</a>
        <a class="btn btn-outline btn-lg" href="docs.html">Read the docs</a>
      </div>
    </div>
  </main>
</div>
</body>
</html>
