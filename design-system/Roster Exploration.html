<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasca — Roster exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tasca.css">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/roster.css">
<link rel="stylesheet" href="assets/a11y.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; background: #f0eee9; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="roster-content.js"></script>
<script src="foundation-content.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const RC = window.RC, FC = window.FC;

function Board({ theme, html }) {
  return <div data-theme={theme}
    style={{ height: '100%', width: '100%', background: 'var(--bg)' }}
    dangerouslySetInnerHTML={{ __html: html }} />;
}

const RW = 1320, RH = 960; // roster board size

function App() {
  return (
    <DesignCanvas>
      <DCSection id="identity" title="Identity — logo directions"
        subtitle="Geometric · infrastructural · calm. Three marks to compare; pick one to carry the brand.">
        <DCArtboard id="logo-a" label="A · Stack"   width={380} height={470}><Board theme="dark" html={FC.logoBoard('stack')} /></DCArtboard>
        <DCArtboard id="logo-b" label="B · Router"  width={380} height={470}><Board theme="dark" html={FC.logoBoard('router')} /></DCArtboard>
        <DCArtboard id="logo-c" label="C · Cluster" width={380} height={470}><Board theme="dark" html={FC.logoBoard('cluster')} /></DCArtboard>
      </DCSection>

      <DCSection id="foundation" title="Foundation — the system the Roster sits on"
        subtitle="Agent states, capability tiers, neutral vendor indicators, type. All token-driven, both themes, colour-blind safe.">
        <DCArtboard id="f-states" label="Agent states"      width={580} height={392}><Board theme="dark" html={FC.statesPanel()} /></DCArtboard>
        <DCArtboard id="f-tiers"  label="Capability tiers"   width={580} height={416}><Board theme="dark" html={FC.tierPanel()} /></DCArtboard>
        <DCArtboard id="f-vendor" label="Vendor indicators"  width={470} height={340}><Board theme="dark" html={FC.vendorPanel()} /></DCArtboard>
        <DCArtboard id="f-type"   label="Type"               width={580} height={416}><Board theme="dark" html={FC.typePanel()} /></DCArtboard>
        <DCArtboard id="f-states-l" label="Agent states · light" width={580} height={392}><Board theme="light" html={FC.statesPanel()} /></DCArtboard>
      </DCSection>

      <DCSection id="roster" title="Roster — “Your Team”"
        subtitle="Three genuinely different layouts. Same data, same tokens. Read each in both themes.">
        <DCArtboard id="a-dark"  label="A · Card grid (dark)"     width={RW} height={RH}><Board theme="dark"  html={RC.cardGrid()} /></DCArtboard>
        <DCArtboard id="a-light" label="A · Card grid (light)"    width={RW} height={RH}><Board theme="light" html={RC.cardGrid()} /></DCArtboard>
        <DCArtboard id="b-dark"  label="B · Ops console (dark)"   width={RW} height={RH}><Board theme="dark"  html={RC.opsTable()} /></DCArtboard>
        <DCArtboard id="b-light" label="B · Ops console (light)"  width={RW} height={RH}><Board theme="light" html={RC.opsTable()} /></DCArtboard>
        <DCArtboard id="c-dark"  label="C · Attention-grouped (dark)"  width={RW} height={RH}><Board theme="dark"  html={RC.grouped()} /></DCArtboard>
        <DCArtboard id="c-light" label="C · Attention-grouped (light)" width={RW} height={RH}><Board theme="light" html={RC.grouped()} /></DCArtboard>
      </DCSection>

      <DCSection id="states" title="Real states — honest, no fake data"
        subtitle="Every data surface ships these. Empty is a welcome, not a void; error is specific; loading mirrors the real footprint.">
        <DCArtboard id="s-empty"   label="Empty · build your team" width={1100} height={620}><Board theme="dark" html={RC.emptyState()} /></DCArtboard>
        <DCArtboard id="s-loading" label="Loading · skeletons"     width={RW}   height={660}><Board theme="dark" html={RC.loadingState()} /></DCArtboard>
        <DCArtboard id="s-error"   label="Error · specific"        width={1100} height={620}><Board theme="dark" html={RC.errorState()} /></DCArtboard>
        <DCArtboard id="s-empty-l" label="Empty · light"           width={1100} height={620}><Board theme="light" html={RC.emptyState()} /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
