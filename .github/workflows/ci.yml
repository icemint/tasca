name: CI

# Validate the platform packages on every PR to main and every feature-branch
# push: typecheck + the routing CAS proof against a real Postgres. Never deploys.
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + test (Postgres)
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: tasca
          POSTGRES_DB: tasca
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://postgres:tasca@localhost:5432/tasca
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint (boundaries, org-scoping, AA-contrast, hardcoded-color)
        run: pnpm lint
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test (incl. Postgres CAS proof)
        run: pnpm test

  app:
    name: app (typecheck + test + build)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      # The app is a standalone package (its own lockfile, NOT a workspace member),
      # so install/typecheck/test/build run in app/ with --ignore-workspace.
      - name: Install
        working-directory: app
        run: pnpm install --frozen-lockfile --ignore-workspace
      - name: Typecheck
        working-directory: app
        run: pnpm typecheck
      - name: Test
        working-directory: app
        run: pnpm test
      - name: Build
        working-directory: app
        run: pnpm build
