name: spike-headless-boot

# The vendor's green gate for @tasca/execution: build the de-Electron Emdash
# fork from the native-rebuild recipe and prove the headless boot (SC1/SC2/
# SC3-trivial/SC5/SC6) on Linux + macOS. This is heavy (native compiles) and is
# deliberately ISOLATED from ci.yml — it runs only on changes under
# packages/execution or this workflow, plus on manual dispatch.

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/execution/**'
      - '.github/workflows/spike-headless-boot.yml'
  push:
    branches-ignore: [main]
    paths:
      - 'packages/execution/**'
      - '.github/workflows/spike-headless-boot.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: spike-headless-boot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  headless-boot:
    name: build + headless boot (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # keytar (node-gyp) needs libsecret headers on Linux.
      - name: Install libsecret (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # Pin Python 3.11: 3.12+ removed distutils and node-gyp fails.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install workspace (root)
        run: pnpm install --frozen-lockfile

      - name: Activate vendor pnpm
        working-directory: packages/execution/vendor/emdash
        run: corepack prepare pnpm@10.28.2 --activate

      - name: Build the de-Electron vendor fork (native-rebuild recipe)
        working-directory: packages/execution
        env:
          TASCA_PYTHON_311: python3.11
          # build-vendor.mjs runs the vendor's pinned pnpm via corepack; suppress
          # the first-run download prompt so it is non-interactive in CI.
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: node scripts/build-vendor.mjs

      - name: Headless boot harness (SC1/SC2/SC3-trivial/SC5/SC6)
        working-directory: packages/execution
        run: pnpm harness

  # The real-agent + real-PR criteria (SC3-real-agent / SC4). Both are pure
  # shell, no Electron — they need credentials (pre-wired below) and the Claude
  # Code CLI. Gated to manual dispatch + spike/* branches so it does NOT run on
  # every PR (it makes real API calls and opens a real PR on the target repo).
  spike-sc1-7:
    name: full SC1-7 (real agent + real PR) — gated
    needs: headless-boot
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/spike/') }}
    runs-on: ubuntu-24.04
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SPIKE_GH_TOKEN: ${{ secrets.SPIKE_GH_TOKEN }}
      GH_TOKEN: ${{ secrets.SPIKE_GH_TOKEN }}
      SPIKE_TARGET_REPO: roadhero/agentic-playground
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install libsecret (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pnpm install --frozen-lockfile
      - name: Activate vendor pnpm
        working-directory: packages/execution/vendor/emdash
        run: corepack prepare pnpm@10.28.2 --activate
      - name: Build the de-Electron vendor fork
        working-directory: packages/execution
        env:
          TASCA_PYTHON_311: python3.11
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: node scripts/build-vendor.mjs
      # Install the Claude Code CLI (the real SC3 agent) onto PATH.
      - name: Install Claude Code CLI
        run: |
          npm i -g @anthropic-ai/claude-code
          claude --version
      # Authenticate git + gh to the target repo via the spike token, so
      # `git push` / `gh pr create` work for SC4. The harness also calls this,
      # but wiring it here makes the credential helper available process-wide.
      - name: Auth git/gh to target repo
        run: gh auth setup-git
      # Full SC1-7: Story -> isolated worktree -> REAL Claude Code agent -> REAL PR.
      - name: Full SC1-7 harness (real agent + real PR)
        working-directory: packages/execution
        run: pnpm harness:sc17
