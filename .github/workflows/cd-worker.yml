name: CD (worker)

# Build the Tasca worker image (coordination HTTP server + in-process execution)
# from deploy/worker.Dockerfile, push it to GHCR under an immutable sha-<short>
# tag, then point the Coolify worker resource at that tag and redeploy. Serves
# api.tasca.dev (the Shortcut webhook target + /healthz).
#
# The image build runs the full native-rebuild recipe (sqlite3/node-pty/keytar)
# inside Docker, so — unlike the static website/app builds — there is no pnpm
# pre-build step on the runner. Runs only when the worker's sources change on
# main (or manually); never on PRs.
on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'deploy/base.Dockerfile'
      - 'deploy/worker.Dockerfile'
      - '.dockerignore'
      - 'scripts/coolify-deploy.sh'
      - '.github/workflows/cd-worker.yml'
  workflow_dispatch:

concurrency:
  group: cd-worker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/icemint/tasca-worker
  # The shared vendor base (native rebuild + git/gh/claude + the installed workspace).
  # Built ONCE here and published so the worker (and slice-4's runner image) both
  # `FROM` it — no second native rebuild, no drift between the two images.
  IMAGE_BASE: ghcr.io/icemint/tasca-base

jobs:
  build-and-deploy:
    name: Build worker → GHCR → Coolify (SHA-pinned)
    runs-on: ubuntu-24.04
    env:
      COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      COOLIFY_WORKER_RESOURCE_UUID: ${{ secrets.COOLIFY_WORKER_RESOURCE_UUID }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive # @tasca/execution vendors emdash as a submodule

      - name: Compute image tag
        id: vars
        run: |
          short="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "sha_tag=sha-${short}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build + push the shared base FIRST (the heavy native rebuild). Tagged by the
      # immutable SHA (consumed by the worker build below) and :latest (the default
      # FROM for local/manual builds + the runner image).
      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/base.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:${{ steps.vars.outputs.sha_tag }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/worker.Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            TASCA_BASE_IMAGE=${{ env.IMAGE_BASE }}:${{ steps.vars.outputs.sha_tag }}
            GIT_SHA=${{ steps.vars.outputs.short_sha }}
          tags: ${{ env.IMAGE }}:${{ steps.vars.outputs.sha_tag }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      # Deploy by the immutable SHA tag (same script the app/site use). Skips
      # gracefully until COOLIFY_WORKER_RESOURCE_UUID is set — so the image can be
      # built and pushed to GHCR before the Coolify resource exists, letting the
      # first resource be created pointing at a real tag.
      - name: Deploy to Coolify (PATCH image tag → deploy → verify rollout)
        if: ${{ env.COOLIFY_WORKER_RESOURCE_UUID != '' }}
        env:
          IMAGE: ${{ env.IMAGE }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
          COOLIFY_RESOURCE_UUID: ${{ secrets.COOLIFY_WORKER_RESOURCE_UUID }}
          # Opt in to live-SHA verification: after Coolify reports a finished rollout,
          # poll the worker's public /version until it equals EXPECT_SHA, else fail the
          # job (catches a Coolify redeploy that silently re-served the old image). The
          # app/site deploys share this script but don't set these, so they skip the check.
          VERIFY_SHA_URL: https://api.tasca.dev/version
          EXPECT_SHA: ${{ steps.vars.outputs.short_sha }}
        run: bash scripts/coolify-deploy.sh
