name: CD (app)

# Build the Tasca app shell (Astro static → nginx image), push it to GHCR under
# an immutable sha-<short> tag, ensure the Coolify app resource exposes port 80,
# then point it at that tag and redeploy. Serves app.tasca.dev (the sign-in
# surface today; the full application lands here as Stage 1 ships).
#
# Runs only when the app shell changes on main (or manually) — never on PRs.
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'scripts/coolify-deploy.sh'
      - '.github/workflows/cd-app.yml'
  workflow_dispatch:

concurrency:
  group: cd-app-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/icemint/tasca-app
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"

jobs:
  build-and-deploy:
    name: Build app shell → GHCR → Coolify (SHA-pinned)
    runs-on: ubuntu-24.04
    env:
      COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      COOLIFY_RESOURCE_UUID: ${{ secrets.COOLIFY_RESOURCE_UUID }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: vars
        run: |
          short="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "sha_tag=sha-${short}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short}" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install app deps
        working-directory: app
        # --ignore-workspace: app/ is a standalone Astro project with its own
        # lockfile. Without this, pnpm walks up to the repo's pnpm-workspace.yaml
        # and installs the workspace instead, leaving app/node_modules empty
        # (astro not found at build).
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Build static app shell
        working-directory: app
        # PUBLIC_GIT_SHA bakes the short commit SHA into dist/version.txt (src/pages/version.txt.ts via
        # import.meta.env) so the deploy step can verify the LIVE app is THIS build — not a silently
        # re-served old image (#5318). PUBLIC_-prefixed so Vite/Astro exposes it to import.meta.env.
        env:
          PUBLIC_GIT_SHA: ${{ steps.vars.outputs.short_sha }}
        run: pnpm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (nginx + dist)
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.vars.outputs.sha_tag }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      # The app resource previously ran the Rust server on its own port; this
      # static nginx image listens on :80, so align the resource's exposed port
      # before switching the image. Best-effort (warn, don't fail) so a field/API
      # difference doesn't block the deploy.
      - name: Align app resource to port 80
        if: ${{ env.COOLIFY_API_URL != '' }}
        run: |
          base="${COOLIFY_API_URL%/}"
          if curl -fsS -X PATCH "${base}/api/v1/applications/${COOLIFY_RESOURCE_UUID}" \
              -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" -H "Content-Type: application/json" \
              -d '{"ports_exposes":"80"}' >/dev/null; then
            echo "ports_exposes set to 80"
          else
            echo "::warning::could not set ports_exposes=80 (continuing; verify app.tasca.dev after deploy)"
          fi

      # Gate on the resource UUID (not just the API URL): the build + GHCR push
      # still run, and the deploy skips gracefully until COOLIFY_RESOURCE_UUID is
      # set — same pattern as cd-worker. Avoids a hard fail on an unset UUID.
      - name: Deploy to Coolify (PATCH image tag → deploy → verify rollout)
        if: ${{ env.COOLIFY_RESOURCE_UUID != '' }}
        env:
          IMAGE: ${{ env.IMAGE }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
          # Opt in to live-SHA verification (same gate the worker got in #288): after Coolify reports a
          # finished rollout, poll the app's public /version.txt until it equals EXPECT_SHA, else fail —
          # so a Coolify redeploy that re-served the old image can't pass green. "Merged = live" for the app.
          VERIFY_SHA_URL: https://app.tasca.dev/version.txt
          EXPECT_SHA: ${{ steps.vars.outputs.short_sha }}
        run: bash scripts/coolify-deploy.sh
