name: CD (agent-runner)

# Build the Tasca agent-runner image (deploy/runner.Dockerfile) FROM the shared base
# published by cd-worker.yml, push it to GHCR under an immutable sha-<short> tag, then
# point the Coolify runner resource at that tag and redeploy.
#
# The runner is the lowest-trust process: non-root, no worker secret, egress-restricted
# (see docs/decisions/2026-06-09-coordination-execution-split.md). It shares the heavy
# toolchain with the worker via the base image — no second native rebuild here.
#
# Runs only when the runner's sources change on main (or manually); never on PRs. It reuses
# the base that cd-worker built; if the base changed in the same push, cd-worker republishes
# it first — order across workflows isn't guaranteed, so this also (cheaply, via cache)
# rebuilds the base to guarantee a present, current base before the runner build.
on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'deploy/base.Dockerfile'
      - 'deploy/runner.Dockerfile'
      - '.dockerignore'
      - 'scripts/coolify-deploy.sh'
      - '.github/workflows/cd-runner.yml'
  workflow_dispatch:

concurrency:
  group: cd-runner-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/icemint/tasca-runner
  IMAGE_BASE: ghcr.io/icemint/tasca-base

jobs:
  build-and-deploy:
    name: Build agent-runner → GHCR → Coolify (SHA-pinned)
    runs-on: ubuntu-24.04
    env:
      COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      COOLIFY_RUNNER_RESOURCE_UUID: ${{ secrets.COOLIFY_RUNNER_RESOURCE_UUID }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive # @tasca/execution vendors emdash as a submodule

      - name: Compute image tag
        id: vars
        run: echo "sha_tag=sha-$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Ensure a current base is present (shared gha cache with cd-worker → near-instant
      # when the base is unchanged). Tagged by SHA so the runner build pins to it.
      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/base.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:${{ steps.vars.outputs.sha_tag }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

      - name: Build and push agent-runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/runner.Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            TASCA_BASE_IMAGE=${{ env.IMAGE_BASE }}:${{ steps.vars.outputs.sha_tag }}
          tags: ${{ env.IMAGE }}:${{ steps.vars.outputs.sha_tag }}
          cache-from: type=gha,scope=runner
          cache-to: type=gha,mode=max,scope=runner

      # Deploy by the immutable SHA tag. Skips gracefully until the Coolify runner
      # resource UUID is set — so the image can be built + pushed before the resource
      # exists, letting the first resource be created pointing at a real tag.
      - name: Deploy to Coolify (PATCH image tag → deploy → verify rollout)
        if: ${{ env.COOLIFY_RUNNER_RESOURCE_UUID != '' }}
        env:
          IMAGE: ${{ env.IMAGE }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
          COOLIFY_RESOURCE_UUID: ${{ secrets.COOLIFY_RUNNER_RESOURCE_UUID }}
        run: bash scripts/coolify-deploy.sh
